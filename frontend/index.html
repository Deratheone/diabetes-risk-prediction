<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GlycoSense v2 — Diabetes Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#04091a;--sf:#0a1628;--sf2:#0f1f38;--sf3:#152742;--br:rgba(82,156,214,.10);--brg:rgba(82,156,214,.24);--tx:#deeaf8;--mu:#627ea0;--ac:#38bdf8;--ac2:#7c8ef8;--gn:#4ade80;--ye:#facc15;--or:#fb923c;--re:#f87171;--r:18px;--rs:11px;--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--tr:all .28s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-weight:400;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,button,select{font-family:inherit}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* Spotlight feature */
.card-spotlight {
  position: relative;
  overflow: hidden;
  --mouse-x: 50%;
  --mouse-y: 50%;
  --spotlight-color: rgba(56, 189, 248, 0.15);
}
.card-spotlight::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), var(--spotlight-color), transparent 80%);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 10;
}
.card-spotlight:hover::before,
.card-spotlight:focus-within::before {
  opacity: 0.6;
}

/* header */
.app-header{position:relative;z-index:10;padding:18px 40px;border-bottom:1px solid var(--br);backdrop-filter:blur(16px);background:rgba(4,9,26,.72)}
.hdr-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo-g{display:flex;align-items:center;gap:13px}
.logo-hex{width:44px;height:44px;background:linear-gradient(135deg,#38bdf8,#7c8ef8);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 20px rgba(56,189,248,.25)}
.logo-nm{display:block;font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(90deg,#38bdf8,#7c8ef8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tg{display:block;font-size:10.5px;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.hdr-pill{font-size:11px;color:var(--ac);border:1px solid rgba(56,189,248,.28);background:rgba(56,189,248,.06);padding:4px 13px;border-radius:20px;letter-spacing:.4px;font-family:var(--fd)}

/* main */
.main{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:38px 20px 90px}

/* progress */
.prog-wrap{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;row-gap:10px;margin-bottom:34px}
.prog-item{display:flex;align-items:center}
.prog-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:2px solid var(--br);background:var(--sf2);color:var(--mu);transition:var(--tr);flex-shrink:0;z-index:1}
.prog-dot.active{border-color:var(--ac);background:rgba(56,189,248,.12);color:var(--ac);box-shadow:0 0 22px rgba(56,189,248,.28)}
.prog-dot.done{border-color:var(--gn);background:rgba(74,222,128,.12);color:var(--gn);font-size:14px;font-weight:700}
.prog-lbl{display:none;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;margin-left:6px;font-family:var(--fd)}
.prog-lbl.active{display:block;color:var(--ac)}
.prog-ln{width:36px;height:2px;background:var(--br);transition:background .4s}
.prog-ln.done{background:var(--gn)}

/* card */
.form-card{background:var(--sf);border:1px solid var(--br);border-radius:24px;padding:40px 42px;box-shadow:0 32px 72px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.025) inset}

/* animations */
@keyframes siFwd{from{opacity:0;transform:translateX(44px)}to{opacity:1;transform:translateX(0)}}
@keyframes siBck{from{opacity:0;transform:translateX(-44px)}to{opacity:1;transform:translateX(0)}}
@keyframes animIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.anim-fwd{animation:siFwd .36s cubic-bezier(.4,0,.2,1) both}
.anim-bck{animation:siBck .36s cubic-bezier(.4,0,.2,1) both}
.anim-in{animation:animIn .3s ease both}

/* step header */
.sth{display:flex;align-items:center;gap:16px;margin-bottom:30px}
.sth-icon{width:54px;height:54px;min-width:54px;border-radius:var(--r);background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(124,142,248,.1));border:1px solid var(--brg);display:flex;align-items:center;justify-content:center;font-size:24px}
.sth-title{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:-.5px}
.sth-sub{font-size:13.5px;color:var(--mu);margin-top:3px}

/* fields */
.fgrid{display:grid;gap:18px;margin-bottom:24px}
.fgrid.c2{grid-template-columns:repeat(2,1fr)}
.field{display:flex;flex-direction:column;gap:6px}
.flbl{font-size:11.5px;font-weight:500;font-family:var(--fd);color:var(--mu);text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;gap:6px}
.funit{font-size:10px;color:var(--ac);background:rgba(56,189,248,.1);padding:1px 7px;border-radius:4px;font-weight:400;text-transform:lowercase;letter-spacing:0}
.field input{background:var(--sf2);border:1px solid var(--br);border-radius:var(--rs);padding:13px 16px;font-size:15.5px;color:var(--tx);outline:none;transition:var(--tr);width:100%}
.field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(56,189,248,.10);background:rgba(56,189,248,.03)}
.field input::placeholder{color:#24405e}
.fhint{font-size:11px;color:#3a5a7a;line-height:1.4}
.ferr{font-size:11px;color:var(--re);font-weight:500}
.field.herr input{border-color:var(--re);box-shadow:0 0 0 3px rgba(248,113,113,.1)}

/* gender selector */
.gender-row{display:flex;gap:12px;margin-bottom:24px}
.gcard{flex:1;background:var(--sf2);border:1.5px solid var(--br);border-radius:var(--r);padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:var(--tr);user-select:none}
.gcard:hover{border-color:var(--brg);transform:translateY(-2px)}
.gcard.sel-m{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.08);box-shadow:0 0 24px rgba(56,189,248,.12)}
.gcard.sel-f{border-color:rgba(124,142,248,.5);background:rgba(124,142,248,.08);box-shadow:0 0 24px rgba(124,142,248,.12)}
.gcard.sel-o{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.08);box-shadow:0 0 24px rgba(74,222,128,.12)}
.gico{font-size:30px}
.gnm{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--tx)}
.gchk{width:20px;height:20px;border-radius:50%;border:2px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:var(--tr)}
.gcard.sel-m .gchk{background:var(--ac);border-color:var(--ac);color:#050c1a}
.gcard.sel-f .gchk{background:var(--ac2);border-color:var(--ac2);color:#050c1a}
.gcard.sel-o .gchk{background:var(--gn);border-color:var(--gn);color:#050c1a}
.gender-err{font-size:11px;color:var(--re);font-weight:500;margin-top:-18px;margin-bottom:12px}

/* calc panel */
.cpanel{background:linear-gradient(135deg,rgba(56,189,248,.04),rgba(124,142,248,.04));border:1px solid rgba(56,189,248,.16);border-radius:var(--r);padding:22px 24px 18px;margin-top:4px}
.cp-title{font-family:var(--fd);font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:18px;display:flex;align-items:center;gap:7px}
.cpgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.ccard{background:var(--sf3);border:1px solid var(--br);border-radius:var(--rs);padding:18px 18px 14px}
.ccard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.clbl{font-family:var(--fd);font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mu)}
.cbadge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;font-family:var(--fd)}
.cval{font-family:var(--fd);font-size:42px;font-weight:800;line-height:1;margin-bottom:14px;letter-spacing:-1px}
.skinval{color:var(--ac2)!important}
.ctrack{width:100%;height:6px;background:var(--sf2);border-radius:3px;position:relative;overflow:visible;margin-bottom:6px}
.cfill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.cthumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--bg);transition:left .7s cubic-bezier(.4,0,.2,1)}
.cscale{display:flex;justify-content:space-between;font-size:9.5px;color:#2d4f6b;margin-top:4px}
.cunit-row{display:flex;align-items:baseline;gap:8px;margin-top:6px}
.cunit{font-size:13px;color:var(--ac2);font-weight:600}
.chint{font-size:11px;color:var(--mu)}
.cformula{font-size:10px;color:var(--ac2);background:rgba(124,142,248,.12);border:1px solid rgba(124,142,248,.2);padding:2px 8px;border-radius:4px;font-family:monospace}

/* info box */
.ibox{background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.14);border-radius:var(--rs);padding:13px 16px;display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--mu);line-height:1.55;margin-top:4px}

/* relatives */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.rcard{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:18px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:var(--tr);position:relative;user-select:none}
.rcard:hover{border-color:var(--brg);transform:translateY(-2px)}
.rcard.sel{border-color:rgba(56,189,248,.35);background:rgba(56,189,248,.06);box-shadow:0 0 24px rgba(56,189,248,.10)}
.rico{font-size:30px}
.rnm{font-family:var(--fd);font-size:12px;font-weight:600;text-align:center;color:var(--tx);line-height:1.3}
.rsc{font-size:11px;color:var(--gn);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);padding:1px 8px;border-radius:20px;font-family:var(--fd)}
.rchk{position:absolute;top:9px;right:9px;width:20px;height:20px;border-radius:50%;border:2px solid var(--br);background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ac);transition:var(--tr)}
.rcard.sel .rchk{background:var(--ac);border-color:var(--ac);color:#050c1a}

/* others panel */
.opanel{background:rgba(124,142,248,.05);border:1px solid rgba(124,142,248,.18);border-radius:var(--r);padding:20px 22px;margin-bottom:20px}
.oq{display:flex;align-items:center;gap:10px;font-size:14px;margin-bottom:14px;font-weight:500}
.obtns{display:flex;gap:12px;flex-wrap:wrap}
.obtn{flex:1;min-width:160px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--rs);padding:12px 16px;cursor:pointer;transition:var(--tr);color:var(--tx);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.obtn:hover{border-color:var(--brg)}
.obtn.sel{border-color:var(--ac2);background:rgba(124,142,248,.1)}
.stag{margin-left:auto;font-size:11px;color:var(--gn);background:rgba(74,222,128,.1);padding:1px 7px;border-radius:20px;font-family:var(--fd)}

/* pedigree display */
.pdisp{background:linear-gradient(135deg,var(--sf2),var(--sf3));border:1px solid rgba(74,222,128,.18);border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.pleft{flex:1;display:flex;flex-direction:column;gap:10px}
.plbl{font-family:var(--fd);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--mu)}
.pchips{display:flex;flex-wrap:wrap;gap:7px}
.pchip{font-size:12px;color:var(--tx);background:var(--sf3);border:1px solid var(--br);border-radius:20px;padding:3px 11px}
.pchip b{color:var(--gn)}
.pnone{font-size:13px;color:var(--mu);font-style:italic}
.pright{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.pval{font-family:var(--fd);font-size:52px;font-weight:800;line-height:1;letter-spacing:-2px;background:linear-gradient(135deg,#4ade80,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.punit{font-size:12px;color:var(--mu);font-family:var(--fd);text-transform:uppercase;letter-spacing:.5px}

/* sugar */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:4px}
.scard{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:24px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.scard:hover{border-color:var(--brg);transform:translateY(-2px)}
.scard.sel{border-color:var(--ac);background:rgba(56,189,248,.07);box-shadow:0 0 32px rgba(56,189,248,.10)}
.semi{font-size:36px}
.svl{font-family:var(--fd);font-size:16px;font-weight:700}
.sds{font-size:12px;color:var(--mu);text-align:center;line-height:1.4}
.stck{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--ac);color:var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.etop{font-size:12px;color:var(--re);margin-bottom:10px;font-weight:500}

/* warn box */
.wbox{background:rgba(250,204,21,.05);border:1px solid rgba(250,204,21,.18);border-radius:var(--rs);padding:16px 20px;display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
.wbox strong{display:block;font-size:13.5px;color:var(--ye);font-family:var(--fd);margin-bottom:4px}
.wbox p{font-size:13px;color:var(--mu);line-height:1.55}

/* med list */
.mlist{display:flex;flex-direction:column;gap:8px}
.mrow{display:flex;align-items:center;gap:13px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--rs);padding:13px 17px;cursor:pointer;transition:var(--tr)}
.mrow:hover{border-color:var(--brg);background:rgba(56,189,248,.02)}
.mrow.ck{border-color:rgba(56,189,248,.28);background:rgba(56,189,248,.05)}
.mico{font-size:22px;min-width:28px}
.minfo{flex:1}
.mnm{display:block;font-size:13.5px;font-weight:500;font-family:var(--fd)}
.msb{display:block;font-size:11.5px;color:var(--mu);margin-top:2px}
.mtck{width:22px;height:22px;min-width:22px;border:2px solid var(--br);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ac);transition:var(--tr)}
.mrow.ck .mtck{background:rgba(56,189,248,.14);border-color:var(--ac)}
.nnote{font-size:13px;color:var(--gn);margin-top:12px;opacity:.8}

/* summary */
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.ssec{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:18px 20px}
.ssec.wide{grid-column:span 2}
.sstitle{font-family:var(--fd);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.sk{color:var(--mu)}
.sv{font-weight:500;text-align:right}
.snone{font-size:13px;color:var(--mu);font-style:italic}
.chi{color:var(--ac2);font-weight:600;background:rgba(124,142,248,.1);border:1px solid rgba(124,142,248,.2);padding:1px 8px;border-radius:5px;font-family:var(--fd);font-size:12px}

/* predict btn */
.bpredict{width:100%;background:linear-gradient(135deg,#38bdf8 0%,#7c8ef8 50%,#4ade80 100%);background-size:200% 100%;color:#04091a;border:none;padding:17px 28px;border-radius:50px;font-size:15.5px;font-weight:700;font-family:var(--fd);cursor:pointer;letter-spacing:.3px;transition:all .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 16px 42px rgba(56,189,248,.28)}
.bpredict:hover{background-position:100% 0;transform:translateY(-3px);box-shadow:0 24px 54px rgba(56,189,248,.38)}

/* nav */
.nav-row{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:32px;padding-top:22px;border-top:1px solid var(--br)}
.bnext{background:linear-gradient(135deg,#38bdf8,#7c8ef8);color:#fff;border:none;padding:12px 26px;border-radius:50px;font-size:14px;font-weight:600;font-family:var(--fd);cursor:pointer;letter-spacing:.3px;transition:var(--tr);box-shadow:0 8px 22px rgba(56,189,248,.22)}
.bnext:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(56,189,248,.32)}
.bback{background:transparent;color:var(--mu);border:1px solid var(--br);padding:12px 20px;border-radius:50px;font-size:14px;font-weight:500;font-family:var(--fd);cursor:pointer;transition:var(--tr)}
.bback:hover{border-color:var(--brg);color:var(--tx)}

/* result */
.rmain{display:flex;align-items:center;justify-content:center;gap:30px;margin-bottom:28px;flex-wrap:wrap}
.gsv{width:210px;overflow:visible}
.glbls{display:flex;justify-content:space-between;width:210px;margin-top:-6px;font-size:10px;color:var(--mu);font-family:var(--fd);padding:0 8px}
.rbcol{display:flex;flex-direction:column;gap:16px}
.rlc{background:var(--sf2);border:1px solid var(--brg);border-radius:var(--r);padding:20px 28px;text-align:center;min-width:200px}
.rlclbl{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);font-family:var(--fd);margin-bottom:6px}
.rlcval{display:block;font-family:var(--fd);font-size:32px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px}
.rlcbar{height:6px;border-radius:3px;overflow:hidden}
.rlcfill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.rstats{display:flex;gap:10px}
.rsi{flex:1;background:var(--sf2);border:1px solid var(--br);border-radius:var(--rs);padding:12px 14px;display:flex;flex-direction:column;align-items:center;gap:4px}
.rsl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;font-family:var(--fd)}
.rsv{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--tx)}
.fbox{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.ftitle{font-family:var(--fd);font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:13px}
.flist{display:flex;flex-wrap:wrap;gap:8px}
.ftag{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;font-family:var(--fd)}
.disc{background:rgba(124,142,248,.05);border:1px solid rgba(124,142,248,.14);border-radius:var(--rs);padding:13px 16px;display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:var(--mu);line-height:1.55;margin-bottom:22px}
.disc b{color:var(--tx)}
.breset{width:100%;background:transparent;color:var(--mu);border:1px solid var(--br);padding:13px 28px;border-radius:50px;font-size:14px;font-weight:500;font-family:var(--fd);cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px}
.breset:hover{border-color:var(--brg);color:var(--tx)}

@media(max-width:640px){
  .app-header,.hdr-inner{padding:14px 18px}
  .main{padding:28px 14px 70px}
  .form-card{padding:24px 20px}
  .fgrid.c2{grid-template-columns:1fr}
  .sgrid{grid-template-columns:1fr}
  .sum-grid{grid-template-columns:1fr}
  .ssec.wide{grid-column:span 1}
  .rel-grid{grid-template-columns:repeat(2,1fr)}
  .rmain{flex-direction:column}
  .rbcol{width:100%}
  .rlc{min-width:unset}
  .prog-lbl{display:none!important}
  .prog-ln{width:20px}
  .cpgrid{grid-template-columns:1fr}
  .pdisp{flex-direction:column;align-items:flex-start}
  .pright{align-items:flex-start}
  .obtns{flex-direction:column}
  .gender-row{gap:8px}
}
</style>
</head>
<body>

<div id="aurora-bg" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;opacity:0.8;"></div>

<header class="app-header">
  <div class="hdr-inner">
    <div class="logo-g">
      <div class="logo-hex">⬡</div>
      <div>
        <span class="logo-nm">GlycoSense</span>
        <span class="logo-tg">Early Diabetes Detection System</span>
      </div>
    </div>
    <div class="hdr-pill">AI-Powered · v2.0</div>
  </div>
</header>

<main class="main">
  <div class="prog-wrap" id="prog"></div>
  <div class="form-card card-spotlight anim-fwd" id="card"></div>
</main>

<script>
// ── Data ──
const STEPS=[
  {id:1,label:"Basic Details",icon:"👤"},
  {id:2,label:"Clinical",icon:"🧪"},
  {id:3,label:"Family History",icon:"👨‍👩‍👧"},
  {id:4,label:"Lifestyle",icon:"🍬"},
  {id:5,label:"Medicines",icon:"💊"},
  {id:6,label:"Summary",icon:"📋"}
];
const RELS=[
  {id:"father",label:"Father",score:.5,icon:"👨"},
  {id:"mother",label:"Mother",score:.5,icon:"👩"},
  {id:"patGF",label:"Paternal Grandfather",score:.25,icon:"👴"},
  {id:"patGM",label:"Paternal Grandmother",score:.25,icon:"👵"},
  {id:"matGF",label:"Maternal Grandfather",score:.25,icon:"👴"},
  {id:"matGM",label:"Maternal Grandmother",score:.25,icon:"👵"},
  {id:"others",label:"Other Relatives",score:null,icon:"👥"},
];
const MEDS=[
  {id:"steroids",label:"Steroids",sub:"Prednisolone, Dexamethasone, Hydrocortisone",icon:"💉"},
  {id:"diuretics",label:"Diuretics",sub:"Hydrochlorothiazide, Furosemide",icon:"🩹"},
  {id:"antipsych",label:"Antipsychotics",sub:"Olanzapine, Risperidone, Clozapine",icon:"🧠"},
  {id:"ocp",label:"Oral Contraceptive Pills",sub:"OCP / Birth Control",icon:"🔵"},
  {id:"antihiv",label:"Anti-HIV Drugs",sub:"Ritonavir, Lopinavir",icon:"🔬"},
  {id:"antirej",label:"Anti-Rejection Drugs",sub:"Tacrolimus, Cyclosporine",icon:"🫀"},
  {id:"others",label:"Others",sub:"Any other prescription medication",icon:"📦"},
];
const SUGAR=[
  {v:"Low",icon:"🥦",d:"Mostly whole grains & vegetables"},
  {v:"Moderate",icon:"🍚",d:"Occasional sweets or processed foods"},
  {v:"High",icon:"🍰",d:"Regular sugar, sodas, or desserts"},
];

let state={
  step:1,predicted:false,risk:null,errors:{},animDir:"fwd",
  gender:"",
  age:"",weight:"",height:"",waist:"",
  pregnancies:"",bp:"",glucose:"",
  relatives:[],othersClose:null,
  sugar:"",medicines:[]
};

// ── Calculations ──
function bmi(){
  const w=parseFloat(state.weight),h=parseFloat(state.height)/100;
  return(w>0&&h>0)?parseFloat((w/(h*h)).toFixed(1)):null;
}
function st(b){
  const w=parseFloat(state.waist);
  return(b&&w>0)?parseFloat((.5*b+.1*w-5).toFixed(1)):null;
}
function pedigree(){
  let s=0;
  state.relatives.forEach(id=>{
    const r=RELS.find(x=>x.id===id);
    if(!r)return;
    if(r.id==="others"){s+=state.othersClose==="yes"?.2:state.othersClose==="no"?.1:0;}
    else s+=r.score;
  });
  return parseFloat(s.toFixed(2));
}
function bmiCat(b){
  if(!b)return null;
  if(b<18.5)return{l:"Underweight",c:"#38bdf8"};
  if(b<25)return{l:"Normal",c:"#4ade80"};
  if(b<30)return{l:"Overweight",c:"#facc15"};
  return{l:"Obese",c:"#f87171"};
}
function isFemale(){return state.gender==="female";}
function glucoseCat(g){
  if(!g)return null;
  if(g<100)return{l:"Normal",c:"#4ade80"};
  if(g<126)return{l:"Pre-diabetic",c:"#facc15"};
  return{l:"Diabetic range",c:"#f87171"};
}
function calcRisk(){
  const b=bmi(),p=pedigree();
  let s=0;
  if(parseFloat(state.age)>45)s+=2;
  if(parseFloat(state.age)>60)s+=1;
  if(b>30)s+=2; else if(b>25)s+=1;
  if(state.sugar==="High")s+=2; else if(state.sugar==="Moderate")s+=1;
  if(parseFloat(state.bp)>90)s+=2;
  if(p>1)s+=3; else if(p>.5)s+=2; else if(p>0)s+=1;
  s+=state.medicines.length;
  const g=parseFloat(state.glucose);
  if(g>=126)s+=3; else if(g>=100)s+=2;
  if(s<=2)return{level:"Low",color:"#4ade80",pct:18};
  if(s<=5)return{level:"Moderate",color:"#facc15",pct:45};
  if(s<=8)return{level:"High",color:"#fb923c",pct:72};
  return{level:"Very High",color:"#f87171",pct:91};
}

// ── Validation ──
function validate(){
  const e={};
  if(state.step===1){
    if(!state.gender)e.gender="Please select your biological sex";
    if(!state.age)e.age="Required";
    if(!state.weight)e.weight="Required";
    if(!state.height)e.height="Required";
    if(!state.waist)e.waist="Required";
  }
  if(state.step===2&&!state.bp)e.bp="Required";
  if(state.step===4&&!state.sugar)e.sugar="Please select a level";
  return e;
}

// ── Renderers ──
function sth(icon,title,sub){
  return`<div class="sth"><div class="sth-icon">${icon}</div><div><h2 class="sth-title">${title}</h2><p class="sth-sub">${sub}</p></div></div>`;
}
function field(id,label,unit,ph,val,hint,err){
  return`<div class="field${err?" herr":""}">
    <label class="flbl" for="${id}">${label}${unit?`<span class="funit">${unit}</span>`:""}</label>
    <input type="number" id="${id}" placeholder="${ph}" value="${val}" autocomplete="off">
    ${hint?`<span class="fhint">${hint}</span>`:""}
    ${err?`<span class="ferr">${err}</span>`:""}
  </div>`;
}

function renderGenderSelector(){
  const genders=[
    {id:"male",label:"Male",icon:"♂️",selClass:"sel-m"},
    {id:"female",label:"Female",icon:"♀️",selClass:"sel-f"},
    {id:"other",label:"Other / Prefer not to say",icon:"⚧️",selClass:"sel-o"},
  ];
  return`
    <div class="field" style="margin-bottom:8px">
      <label class="flbl">Biological Sex</label>
    </div>
    <div class="gender-row">
      ${genders.map(g=>`
        <div class="gcard${state.gender===g.id?" "+g.selClass:""}" data-gender="${g.id}">
          <span class="gico">${g.icon}</span>
          <span class="gnm">${g.label}</span>
          <div class="gchk">${state.gender===g.id?"✓":""}</div>
        </div>`).join("")}
    </div>
    ${state.errors.gender?`<p class="gender-err">⚠ ${state.errors.gender}</p>`:""}
  `;
}

function renderStep1(){
  const b=bmi(),bc=bmiCat(b),s=st(b);
  const pct=b?Math.min(Math.max(((b-10)/40)*100,0),100):0;
  return sth("👤","Basic Details","Your physical measurements")+
  renderGenderSelector()+
  `<div class="fgrid c2">
    ${field("age","Age","years","e.g. 35",state.age,"",state.errors.age)}
    ${field("weight","Weight","kg","e.g. 70",state.weight,"",state.errors.weight)}
    ${field("height","Height","cm","e.g. 170",state.height,"",state.errors.height)}
    ${field("waist","Waist Circumference","cm","e.g. 88",state.waist,"",state.errors.waist)}
  </div>`+
  ((b||s)?`<div class="cpanel">
    <div class="cp-title"><span>⚡</span> Live Calculations</div>
    <div class="cpgrid">
      ${b?`<div class="ccard">
        <div class="ccard-top">
          <span class="clbl">Body Mass Index</span>
          ${bc?`<span class="cbadge" style="color:${bc.c};background:${bc.c}18;border:1px solid ${bc.c}33">${bc.l}</span>`:""}
        </div>
        <div class="cval" style="color:${bc?.c||"var(--ac)"}">${b}</div>
        <div class="ctrack">
          <div class="cfill" style="width:${pct}%;background:${bc?.c||"var(--ac)"}"></div>
          <div class="cthumb" style="left:${pct}%;background:${bc?.c||"var(--ac)"}"></div>
        </div>
        <div class="cscale"><span>10</span><span>18.5</span><span>25</span><span>30</span><span>50</span></div>
      </div>`:""}
      ${s!==null&&s>0?`<div class="ccard">
        <div class="ccard-top">
          <span class="clbl">Skin Thickness</span>
          <span class="cformula">0.5×BMI + 0.1×Waist − 5</span>
        </div>
        <div class="cval skinval">${s}</div>
        <div class="cunit-row"><span class="cunit">mm</span><span class="chint">Derived from your measurements</span></div>
      </div>`:""}
    </div>
  </div>`:"");
}

function renderStep2(){
  const female=isFemale();
  const g=parseFloat(state.glucose),gc=glucoseCat(g);
  const gpct=g?Math.min(Math.max(((g-60)/200)*100,0),100):0;
  return sth("🧪","Clinical Inputs","Recent medical measurements")+
  `<div class="fgrid c2">
    ${female?field("preg","Number of Pregnancies","count","e.g. 2",state.pregnancies,"Enter 0 if no pregnancies",""):""}
    ${field("bp","Diastolic Blood Pressure","mm Hg","e.g. 72",state.bp,"",state.errors.bp)}
    ${field("glucose","Fasting Blood Glucose","mg/dL","e.g. 95",state.glucose,"Fasting glucose from your latest blood test",state.errors.glucose)}
  </div>`+
  (gc?`<div class="cpanel" id="glucosePanel">
    <div class="cp-title"><span>🩸</span> Glucose Status</div>
    <div class="cpgrid">
      <div class="ccard">
        <div class="ccard-top">
          <span class="clbl">Fasting Blood Glucose</span>
          <span class="cbadge" style="color:${gc.c};background:${gc.c}18;border:1px solid ${gc.c}33">${gc.l}</span>
        </div>
        <div class="cval" style="color:${gc.c}">${g}</div>
        <div class="ctrack">
          <div class="cfill" style="width:${gpct}%;background:${gc.c}"></div>
          <div class="cthumb" style="left:${gpct}%;background:${gc.c}"></div>
        </div>
        <div class="cscale"><span>60</span><span>100</span><span>126</span><span>200+</span></div>
        <div class="cunit-row" style="margin-top:8px">
          <span class="cunit" style="color:${gc.c}">mg/dL</span>
          <span class="chint">${g<100?"Within normal fasting range":g<126?"Impaired fasting glucose — monitor closely":"Above diabetic threshold"}</span>
        </div>
      </div>
    </div>
  </div>`:"") +
  `<div class="ibox"><span>ℹ️</span><p>Use values from your most recent lab report or medical checkup for the most accurate prediction.</p></div>`;
}

function renderStep3(){
  const p=pedigree();
  const selRels=RELS.filter(r=>state.relatives.includes(r.id));
  const othSel=state.relatives.includes("others");
  return sth("👨‍👩‍👧","Family History","Select relatives who have or had diabetes")+
  `<div class="rel-grid">
    ${RELS.map(r=>`<div class="rcard${state.relatives.includes(r.id)?" sel":""}" data-rel="${r.id}">
      <span class="rico">${r.icon}</span>
      <span class="rnm">${r.label}</span>
      ${r.score!==null?`<span class="rsc">+${r.score}</span>`:""}
      <div class="rchk">${state.relatives.includes(r.id)?"✓":""}</div>
    </div>`).join("")}
  </div>`+
  (othSel?`<div class="opanel anim-in">
    <div class="oq"><span>❓</span><span>Is this a <strong>close relative</strong>?</span></div>
    <div class="obtns">
      <button class="obtn${state.othersClose==="yes"?" sel":""}" data-oc="yes">👍 Yes — Close Relative <span class="stag">+0.2</span></button>
      <button class="obtn${state.othersClose==="no"?" sel":""}" data-oc="no">👎 No — Distant Relative <span class="stag">+0.1</span></button>
    </div>
  </div>`:"")+
  `<div class="pdisp">
    <div class="pleft">
      <span class="plbl">Diabetes Pedigree Score</span>
      <div class="pchips">
        ${selRels.length===0?`<span class="pnone">No relatives selected</span>`:selRels.map(r=>{
          const sc=r.id==="others"?(state.othersClose==="yes"?.2:state.othersClose==="no"?.1:"?"):r.score;
          return`<span class="pchip">${r.icon} ${r.label}: <b>+${sc}</b></span>`;
        }).join("")}
      </div>
    </div>
    <div class="pright">
      <span class="pval">${p.toFixed(2)}</span>
      <span class="punit">score</span>
    </div>
  </div>`;
}

function renderStep4(){
  return sth("🍬","Lifestyle","Describe your typical sugar and carbohydrate consumption")+
  (state.errors.sugar?`<p class="etop">${state.errors.sugar}</p>`:"")+
  `<div class="sgrid">
    ${SUGAR.map(o=>`<button class="scard${state.sugar===o.v?" sel":""}" data-sugar="${o.v}">
      <span class="semi">${o.icon}</span>
      <span class="svl">${o.v}</span>
      <span class="sds">${o.d}</span>
      ${state.sugar===o.v?`<span class="stck">✓</span>`:""}
    </button>`).join("")}
  </div>`;
}

function renderStep5(){
  return sth("💊","Current Medications","Select all medicines you are currently taking")+
  `<div class="wbox"><span style="font-size:22px;margin-top:1px">⚠️</span>
    <div><strong>Medical Notice</strong>
    <p>Some medicines can increase blood sugar and may affect urine glucose results. Please disclose all current medications for accurate risk assessment.</p></div>
  </div>
  <div class="mlist">
    ${MEDS.map(m=>`<div class="mrow${state.medicines.includes(m.id)?" ck":""}" data-med="${m.id}">
      <span class="mico">${m.icon}</span>
      <div class="minfo"><span class="mnm">${m.label}</span><span class="msb">${m.sub}</span></div>
      <div class="mtck">${state.medicines.includes(m.id)?"✓":""}</div>
    </div>`).join("")}
  </div>
  ${state.medicines.length===0?`<p class="nnote">✓ No medications selected</p>`:""}`;
}

function renderSummary(){
  const b=bmi(),bc=bmiCat(b),s=st(b),p=pedigree();
  const sm=MEDS.filter(m=>state.medicines.includes(m.id));
  const sr=RELS.filter(r=>state.relatives.includes(r.id));
  const genderLabel={male:"Male",female:"Female",other:"Other / Prefer not to say"}[state.gender]||"—";
  function row(k,v){return`<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`;}
  return sth("📋","Review Summary","Confirm your inputs before generating prediction")+
  `<div class="sum-grid">
    <div class="ssec">
      <div class="sstitle">👤 Basic Details</div>
      ${row("Biological Sex",genderLabel)}
      ${row("Age",`${state.age} years`)}
      ${row("Weight",`${state.weight} kg`)}
      ${row("Height",`${state.height} cm`)}
      ${row("Waist",`${state.waist} cm`)}
      ${b?row("BMI",`<span style="color:${bc?.c}">${b} (${bc?.l})</span>`):""}
      ${s?row("Skin Thickness",`<span class="chi">${s} mm</span>`):""}
    </div>
    <div class="ssec">
      <div class="sstitle">🧪 Clinical</div>
      ${isFemale()?row("Pregnancies",state.pregnancies||"0"):""}
      ${row("Blood Pressure",`${state.bp} mm Hg`)}
      ${state.glucose?row("Fasting Glucose",`<span style="color:${glucoseCat(parseFloat(state.glucose))?.c}">${state.glucose} mg/dL (${glucoseCat(parseFloat(state.glucose))?.l})</span>`):""}
    </div>
    <div class="ssec">
      <div class="sstitle">👨‍👩‍👧 Family History</div>
      ${sr.length===0?`<p class="snone">No relatives selected</p>`:sr.map(r=>{const sc=r.id==="others"?(state.othersClose==="yes"?"Close (+0.2)":"Distant (+0.1)"):"+"+r.score;return row(`${r.icon} ${r.label}`,sc);}).join("")}
      ${row("Pedigree Score",`<span class="chi">${p.toFixed(2)}</span>`)}
    </div>
    <div class="ssec">
      <div class="sstitle">🍬 Lifestyle</div>
      ${row("Sugar Intake",state.sugar)}
    </div>
    <div class="ssec wide">
      <div class="sstitle">💊 Medications</div>
      ${sm.length===0?`<p class="snone">No medications selected</p>`:sm.map(m=>row(`${m.icon} ${m.label}`,"Taking")).join("")}
    </div>
  </div>
  <button class="bpredict" id="predictBtn"><span>🔬</span> Generate Risk Prediction</button>`;
}

function renderResult(){
  const r=state.risk,b=bmi(),p=pedigree();
  const sm=MEDS.filter(m=>state.medicines.includes(m.id));
  const factors=[];
  if(parseFloat(state.age)>45)factors.push({t:"Age above 45",c:"#38bdf8"});
  if(b>30)factors.push({t:"BMI in obese range",c:"#f87171"});
  else if(b>25)factors.push({t:"BMI overweight",c:"#facc15"});
  if(state.sugar==="High")factors.push({t:"High sugar intake",c:"#fb923c"});
  if(parseFloat(state.bp)>90)factors.push({t:"Elevated blood pressure",c:"#fb923c"});
  if(p>1)factors.push({t:"Strong family history",c:"#f87171"});
  else if(p>0)factors.push({t:"Family history present",c:"#facc15"});
  if(sm.length>0)factors.push({t:`${sm.length} risk-affecting medication(s)`,c:"#facc15"});
  const g=parseFloat(state.glucose);
  if(g>=126)factors.push({t:`Glucose ${g} mg/dL — diabetic range`,c:"#f87171"});
  else if(g>=100)factors.push({t:`Glucose ${g} mg/dL — pre-diabetic`,c:"#facc15"});
  if(factors.length===0)factors.push({t:"No major risk factors identified",c:"#4ade80"});
  
  const recs=[];
  if(b>25) recs.push("Incorporate 30 mins of daily aerobic exercise to improve insulin sensitivity.");
  if(state.sugar==="High") recs.push("Cut back on sugary drinks and processed sweets; opt for complex carbs.");
  else if(state.sugar==="Moderate") recs.push("Limit added sugars to maintain stable energy levels.");
  if(parseFloat(state.glucose)>=100) recs.push("Schedule a follow-up test (like HbA1c) with your doctor.");
  if(parseFloat(state.bp)>90) recs.push("Reduce daily sodium intake to help lower your blood pressure.");
  if(recs.length===0) recs.push("Keep up the great work! Maintain a balanced diet and regular health checkups.");
  const renderRecs = recs.map((r,i)=>`<li style="margin-bottom:8px;display:flex;gap:8px;"><span style="color:var(--gn);font-weight:bold;">${i+1}.</span> <span style="flex:1">${r}</span></li>`).join("");

  return sth("🔬","Risk Assessment Result","Based on your complete health profile")+
  `<div class="rmain">
    <div>
      <svg class="gsv" viewBox="0 0 200 115">
        <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4ade80"/><stop offset="50%" stop-color="#facc15"/><stop offset="100%" stop-color="#f87171"/>
        </linearGradient></defs>
        <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#1a2f4a" stroke-width="18" stroke-linecap="round"/>
        <path id="gPath" d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="url(#gg)" stroke-width="18" stroke-linecap="round" stroke-dasharray="267" stroke-dashoffset="267" style="transition:stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)"/>
        <text x="100" y="84" text-anchor="middle" fill="${r.color}" font-size="30" font-weight="700" font-family="Syne,sans-serif">${r.pct}%</text>
        <text x="100" y="105" text-anchor="middle" fill="#4a6585" font-size="11" font-family="DM Sans,sans-serif">Risk Score</text>
      </svg>
      <div class="glbls"><span>Low</span><span>Moderate</span><span>High</span></div>
    </div>
    <div class="rbcol">
      <div class="rlc" style="border-color:${r.color}44">
        <span class="rlclbl">Diabetes Risk Level</span>
        <span class="rlcval" style="color:${r.color}">${r.level}</span>
        <div class="rlcbar" style="background:${r.color}22">
          <div class="rlcfill" id="rlcf" style="width:0%;background:${r.color}"></div>
        </div>
      </div>
      <div class="rstats">
        <div class="rsi"><span class="rsl">BMI</span><span class="rsv">${b}</span></div>
        <div class="rsi"><span class="rsl">Pedigree</span><span class="rsv">${p.toFixed(2)}</span></div>
        <div class="rsi"><span class="rsl">Meds</span><span class="rsv">${sm.length}</span></div>
      </div>
    </div>
  </div>
  <div class="fbox">
    <div class="ftitle">⚡ Detected Risk Factors</div>
    <div class="flist">${factors.map(f=>`<span class="ftag" style="color:${f.c};background:${f.c}12;border:1px solid ${f.c}30">${f.t}</span>`).join("")}</div>
  </div>
  <div class="fbox" style="background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.2);">
    <div class="ftitle" style="color:var(--gn);">✨ Actionable Lifestyle Advice</div>
    <ul style="list-style:none;font-size:13px;color:var(--tx);padding:0;margin:0;line-height:1.45;">
      ${renderRecs}
    </ul>
  </div>
  <div class="disc"><span>🛡️</span><p>This tool provides a <b>screening estimate only</b> and is not a medical diagnosis. Always consult a qualified healthcare professional for clinical evaluation and personalised advice.</p></div>
  <button class="breset" id="resetBtn">↺ Start New Assessment</button>`;
}

function renderNav(){
  if(state.step>=6)return"";
  return`<div class="nav-row">
    ${state.step>1?`<button class="bback" id="backBtn">← Back</button>`:""}
    <button class="bnext" id="nextBtn">${state.step===5?"Review Summary →":"Continue →"}</button>
  </div>`;
}

// ── Render & Attach ──
function render(dir){
  const card=document.getElementById("card");
  card.className="form-card card-spotlight anim-"+(dir||state.animDir);
  if(!state.predicted){
    if(state.step===1)card.innerHTML=renderStep1()+renderNav();
    else if(state.step===2)card.innerHTML=renderStep2()+renderNav();
    else if(state.step===3)card.innerHTML=renderStep3()+renderNav();
    else if(state.step===4)card.innerHTML=renderStep4()+renderNav();
    else if(state.step===5)card.innerHTML=renderStep5()+renderNav();
    else if(state.step===6)card.innerHTML=renderSummary();
  } else {
    card.innerHTML=renderResult();
    setTimeout(()=>{
      const gp=document.getElementById("gPath");
      if(gp)gp.style.strokeDashoffset=283-(283*state.risk.pct/100);
      const rf=document.getElementById("rlcf");
      if(rf)rf.style.width=state.risk.pct+"%";
    },120);
  }
  attach();
}

function renderProg(){
  document.getElementById("prog").innerHTML=STEPS.map((s,i)=>`
    <div class="prog-item">
      <div class="prog-dot ${state.step===s.id?"active":state.step>s.id?"done":""}">${state.step>s.id?"✓":s.icon}</div>
      <span class="prog-lbl ${state.step===s.id?"active":""}">${s.label}</span>
      ${i<STEPS.length-1?`<div class="prog-ln ${state.step>s.id?"done":""}"></div>`:""}
    </div>`).join("");
}

function attach(){
  // Gender selection
  document.querySelectorAll("[data-gender]").forEach(el=>{
    el.addEventListener("click",()=>{
      state.gender=el.dataset.gender;
      state.errors.gender=undefined;
      // Reset pregnancies if switching away from female
      if(state.gender!=="female")state.pregnancies="";
      render();
    });
  });

  // In-place calc panel update (avoids destroying inputs & losing focus)
  function updateCalcPanel(){
    const b=bmi(),bc=bmiCat(b),s=st(b);
    const pct=b?Math.min(Math.max(((b-10)/40)*100,0),100):0;
    let panel=document.querySelector(".cpanel");
    const innerHTML=(b||s)?`
      <div class="cp-title"><span>⚡</span> Live Calculations</div>
      <div class="cpgrid">
        ${b?`<div class="ccard">
          <div class="ccard-top">
            <span class="clbl">Body Mass Index</span>
            ${bc?`<span class="cbadge" style="color:${bc.c};background:${bc.c}18;border:1px solid ${bc.c}33">${bc.l}</span>`:""}
          </div>
          <div class="cval" style="color:${bc?.c||"var(--ac)"}">${b}</div>
          <div class="ctrack">
            <div class="cfill" style="width:${pct}%;background:${bc?.c||"var(--ac)"}"></div>
            <div class="cthumb" style="left:${pct}%;background:${bc?.c||"var(--ac)"}"></div>
          </div>
          <div class="cscale"><span>10</span><span>18.5</span><span>25</span><span>30</span><span>50</span></div>
        </div>`:""}
        ${s!==null&&s>0?`<div class="ccard">
          <div class="ccard-top">
            <span class="clbl">Skin Thickness</span>
            <span class="cformula">0.5×BMI + 0.1×Waist − 5</span>
          </div>
          <div class="cval skinval">${s}</div>
          <div class="cunit-row"><span class="cunit">mm</span><span class="chint">Derived from your measurements</span></div>
        </div>`:""}
      </div>`:"";
    if(panel){
      if(innerHTML){panel.innerHTML=innerHTML;}
      else{panel.remove();}
    } else if(innerHTML){
      const nav=document.querySelector(".nav-row");
      const el=document.createElement("div");
      el.className="cpanel";
      el.innerHTML=innerHTML;
      document.getElementById("card").insertBefore(el,nav);
    }
  }

  // Input sync
  const ids=["age","weight","height","waist","preg","bp","glucose"];
  const keys=["age","weight","height","waist","pregnancies","bp","glucose"];
  ids.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener("input",e=>{
      state[keys[i]]=e.target.value;
      state.errors[keys[i]]=undefined;
      if(["weight","height","waist"].includes(keys[i]))updateCalcPanel();
      else if(keys[i]==="glucose"){
        // Update glucose panel in-place without full re-render
        const g=parseFloat(e.target.value),gc=glucoseCat(g);
        const gpct=g?Math.min(Math.max(((g-60)/200)*100,0),100):0;
        let panel=document.getElementById("glucosePanel");
        const innerHTML=gc?`
          <div class="cp-title"><span>🩸</span> Glucose Status</div>
          <div class="cpgrid">
            <div class="ccard">
              <div class="ccard-top">
                <span class="clbl">Fasting Blood Glucose</span>
                <span class="cbadge" style="color:${gc.c};background:${gc.c}18;border:1px solid ${gc.c}33">${gc.l}</span>
              </div>
              <div class="cval" style="color:${gc.c}">${g}</div>
              <div class="ctrack">
                <div class="cfill" style="width:${gpct}%;background:${gc.c}"></div>
                <div class="cthumb" style="left:${gpct}%;background:${gc.c}"></div>
              </div>
              <div class="cscale"><span>60</span><span>100</span><span>126</span><span>200+</span></div>
              <div class="cunit-row" style="margin-top:8px">
                <span class="cunit" style="color:${gc.c}">mg/dL</span>
                <span class="chint">${g<100?"Within normal fasting range":g<126?"Impaired fasting glucose — monitor closely":"Above diabetic threshold"}</span>
              </div>
            </div>
          </div>`:"";
        if(panel){
          if(innerHTML)panel.innerHTML=innerHTML;
          else panel.remove();
        } else if(innerHTML){
          const ibox=document.querySelector(".ibox");
          const el2=document.createElement("div");
          el2.className="cpanel";el2.id="glucosePanel";
          el2.innerHTML=innerHTML;
          ibox.parentNode.insertBefore(el2,ibox);
        }
      }
      else renderProg();
    });
  });
  // Relatives
  document.querySelectorAll("[data-rel]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.rel;
      state.relatives=state.relatives.includes(id)?state.relatives.filter(r=>r!==id):[...state.relatives,id];
      if(id==="others"&&!state.relatives.includes(id))state.othersClose=null;
      render();
    });
  });
  // Others close
  document.querySelectorAll("[data-oc]").forEach(el=>{
    el.addEventListener("click",()=>{state.othersClose=el.dataset.oc;render();});
  });
  // Sugar
  document.querySelectorAll("[data-sugar]").forEach(el=>{
    el.addEventListener("click",()=>{state.sugar=el.dataset.sugar;state.errors.sugar=undefined;render();});
  });
  // Medicines
  document.querySelectorAll("[data-med]").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.med;
      state.medicines=state.medicines.includes(id)?state.medicines.filter(m=>m!==id):[...state.medicines,id];
      render();
    });
  });
  // Next
  const nextBtn=document.getElementById("nextBtn");
  if(nextBtn)nextBtn.addEventListener("click",()=>{
    const e=validate();
    if(Object.keys(e).length){state.errors=e;render();return;}
    state.errors={};state.animDir="fwd";state.step++;renderProg();render("fwd");
  });
  // Back
  const backBtn=document.getElementById("backBtn");
  if(backBtn)backBtn.addEventListener("click",()=>{state.animDir="bck";state.step--;renderProg();render("bck");});
  // Predict
  const pb=document.getElementById("predictBtn");
  if(pb)pb.addEventListener("click",()=>{state.risk=calcRisk();state.predicted=true;render();});
  // Reset
  const rb=document.getElementById("resetBtn");
  if(rb)rb.addEventListener("click",()=>{
    Object.assign(state,{step:1,predicted:false,risk:null,errors:{},animDir:"fwd",gender:"",age:"",weight:"",height:"",waist:"",pregnancies:"",bp:"",glucose:"",relatives:[],othersClose:null,sugar:"",medicines:[]});
    renderProg();render("bck");
  });
}

// ── Init ──
renderProg();
render("fwd");
</script>

<script type="module">
  import { Renderer, Program, Mesh, Color, Triangle } from 'https://cdn.jsdelivr.net/npm/ogl@1.0.10/dist/ogl.mjs';
  const container = document.getElementById('aurora-bg');
  const renderer = new Renderer({ alpha: true, dpr: Math.min(window.devicePixelRatio, 2) });
  const gl = renderer.gl;
  container.appendChild(gl.canvas);

  function resize() { renderer.setSize(window.innerWidth, window.innerHeight); }
  window.addEventListener('resize', resize, false);
  resize();

  const geometry = new Triangle(gl);
  const program = new Program(gl, {
    vertex: `attribute vec2 position; attribute vec2 uv; varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 0.0, 1.0); }`,
    fragment: `
      precision highp float;
      uniform float uTime;
      varying vec2 vUv;
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
      float snoise(vec2 v){
        const vec4 C = vec4(0.211324865, 0.366025403, -0.577350269, 0.024390243);
        vec2 i  = floor(v + dot(v, C.yy)); vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
        vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1; i = mod289(i);
        vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0; vec3 h = abs(x) - 0.5; vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox; m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
        vec3 g; g.x  = a0.x  * x0.x  + h.x  * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
      }
      void main() {
        vec2 uv = vUv;
        vec2 uv1 = uv * 3.0 + vec2(uTime * 0.1, uTime * 0.05);
        vec2 uv2 = uv * 2.0 + vec2(-uTime * 0.08, uTime * 0.12);
        float n1 = snoise(uv1); float n2 = snoise(uv2);
        float wave = sin(uv.x * 5.0 + uTime + n1 * 4.0) * 0.5 + 0.5;
        float wave2 = sin(uv.y * 4.0 - uTime + n2 * 4.0) * 0.5 + 0.5;
        vec3 c1 = mix(vec3(0.22, 0.74, 0.97), vec3(0.49, 0.56, 0.97), wave * 0.5);
        vec3 finalColor = mix(c1, vec3(0.29, 0.87, 0.50), wave2 * 0.5);
        finalColor += vec3(0.22, 0.74, 0.97) * (1.0 - uv.y) * 0.3;
        float dist = distance(uv, vec2(0.5)); finalColor *= smoothstep(0.8, 0.2, dist);
        gl_FragColor = vec4(finalColor, 1.0);
      }
    `,
    uniforms: { uTime: { value: 0 } }
  });
  const mesh = new Mesh(gl, { geometry, program });
  requestAnimationFrame(update);
  function update(t) {
    requestAnimationFrame(update);
    program.uniforms.uTime.value = t * 0.001 * 0.5;
    renderer.render({ scene: mesh });
  }

  // Spotlight JS
  document.addEventListener('mousemove', e => {
    document.querySelectorAll('.card-spotlight').forEach(card => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    });
  });
</script>
